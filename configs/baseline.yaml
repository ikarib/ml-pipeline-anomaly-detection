data:
  input_path: data/sample_pipeline_data.csv

features:
  short_rolling_window: 5
  long_rolling_window: 12

model_isolation_forest:
  contamination: 0.06
  random_state: 42
  n_estimators: 300

model_random_forest:
  test_size: 0.25
  n_estimators: 350
  max_depth: 10
  min_samples_leaf: 2
  class_weight: balanced_subsample
  random_state: 42
  feature_importance_path: artifacts/random_forest_feature_importance.csv

model_xgboost:
  test_size: 0.25
  n_estimators: 350
  learning_rate: 0.05
  max_depth: 6
  subsample: 0.9
  colsample_bytree: 0.9
  reg_lambda: 1.0
  scale_pos_weight: 8.0
  random_state: 42
  feature_importance_path: artifacts/xgboost_feature_importance.csv

model_autoencoder:
    epochs: 50
    batch_size: 32
    learning_rate: 0.001
    threshold_quantile: 0.96
    random_state: 42
    training_history_path: artifacts/autoencoder_training_history.csv
    threshold_sweep_path: artifacts/autoencoder_threshold_sweep.csv

output:
  true_anomalies_path: artifacts/true_anomalies.png
  isolation_forest_scores_path: artifacts/isolation_forest_scores.png
  metrics_path: artifacts/metrics_summary.csv
